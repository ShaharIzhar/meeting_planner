<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeetSync — Find a time that works for everyone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="/">meet<span>sync</span></a>
  </nav>

  <canvas id="dotsCanvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
  <div class="hero" style="position:relative;z-index:1;">
    <div class="hero-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Free &amp; no sign-up required
    </div>

    <h1>Find a time that<br/>works <em id="typedText"></em></h1>
    <p>Share your availability and see where everyone's schedules overlap — instantly.</p>

    <div class="hero-cta">
      <button class="btn-primary" id="createBtn" style="font-size:1.05rem; padding: 18px 48px; border-radius: 12px;">
        Get started
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <p style="color:#b0b0b0; font-size:0.82rem; margin-bottom:0;">No account needed — just share a link</p>
    </div>

    <div class="hero-stats">
      <span><strong>Real-time</strong> availability</span>
      <span>·</span>
      <span><strong>Drag-to-select</strong> time slots</span>
      <span>·</span>
      <span><strong>Instant</strong> overlap view</span>
      <span>·</span>
      <span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <strong>AI</strong> calendar import
      </span>
    </div>
  </div>

  <script>
    // ---- Background dots ----
    const canvas = document.getElementById('dotsCanvas');
    const ctx = canvas.getContext('2d');
    const DOT_COUNT = 38;
    let dots = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < DOT_COUNT; i++) {
      dots.push({
        x:     Math.random() * canvas.width,
        y:     Math.random() * canvas.height,
        r:     2 + Math.random() * 3,
        vx:    (Math.random() - 0.5) * 0.8,
        vy:    (Math.random() - 0.5) * 0.8,
        alpha: 0.08 + Math.random() * 0.18,
        hue:   Math.random() < 0.5 ? 350 : 220, // pink or blue
      });
    }

    function drawDots() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if (d.x < -10) d.x = canvas.width + 10;
        if (d.x > canvas.width + 10) d.x = -10;
        if (d.y < -10) d.y = canvas.height + 10;
        if (d.y > canvas.height + 10) d.y = -10;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${d.hue}, 80%, 60%, ${d.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawDots);
    }
    drawDots();

    // ---- Typewriter ----
    const PHRASES = ['for everyone.', 'with everyone.', 'to all.'];
    const typedEl = document.getElementById('typedText');
    let pIdx = 0, charIdx = 0, deleting = false;

    // Lock width to widest phrase so "works" never moves
    const measurer = document.createElement('span');
    measurer.style.cssText = 'position:absolute;visibility:hidden;font-size:3rem;font-weight:700;white-space:nowrap;';
    document.body.appendChild(measurer);
    let maxW = 0;
    PHRASES.forEach(p => { measurer.textContent = p; maxW = Math.max(maxW, measurer.offsetWidth); });
    measurer.remove();
    typedEl.style.display = 'inline-block';
    typedEl.style.minWidth = maxW + 'px';
    typedEl.style.textAlign = 'left';

    function type() {
      const phrase = PHRASES[pIdx];
      if (!deleting) {
        charIdx++;
        typedEl.textContent = phrase.slice(0, charIdx);
        if (charIdx === phrase.length) {
          deleting = true;
          setTimeout(type, 2200);
          return;
        }
        setTimeout(type, 75);
      } else {
        charIdx--;
        typedEl.textContent = phrase.slice(0, charIdx);
        if (charIdx === 0) {
          deleting = false;
          pIdx = (pIdx + 1) % PHRASES.length;
          setTimeout(type, 300);
          return;
        }
        setTimeout(type, 40);
      }
    }
    type();

    document.getElementById('createBtn').addEventListener('click', async () => {
      const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: '' }),
      });
      const { id } = await res.json();
      window.location.href = `/session.html?id=${id}`;
    });
  </script>
</body>
</html>
